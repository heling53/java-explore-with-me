spring.application.name=ewm-stats-service
server.port=9090
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/ewm_stats}
spring.datasource.username=${POSTGRES_USER:stats}
spring.datasource.password=${POSTGRES_PASSWORD:stats}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=always
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
